<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HSK Battle Arena 3.1 — ระบบฝึกฝนคำศัพท์ภาษาจีน</title>
  <meta name="description" content="ระบบฝึกฝน-ทดสอบคำศัพท์ HSK 1-3 แบบเกมการแข่งขัน">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Sarabun:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <!-- HanziWriter (stroke order animation + quiz mode) -->
  <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>

  <style>
    :root {
      --arena-ink: #172033;
      --arena-lacquer: #2546d2;
      --arena-cinnabar: #ff4d6d;
      --arena-cinnabar-bright: #ff7a59;
      --arena-jade: #00a8a8;
      --arena-jade-soft: #67e8f9;
      --arena-gold: #ffd166;
      --arena-gold-soft: #fff0a3;
      --arena-cream: #ffffff;
      --arena-paper: #ffffff;
      --arena-paper-soft: #eef6ff;
      --arena-paper-shadow: rgba(37, 70, 210, 0.14);
    }
    body {
      font-family: 'Sarabun', sans-serif;
      color: var(--arena-ink);
      background:
        linear-gradient(135deg, rgba(103,232,249,0.18), transparent 32%),
        linear-gradient(225deg, rgba(255,209,102,0.18), transparent 28%),
        linear-gradient(180deg, #f8fbff 0%, #eef6ff 48%, #fff7ed 100%);
    }
    .font-zh { font-family: 'Noto Sans SC', sans-serif; }
    .font-display { font-family: 'Chakra Petch', sans-serif; letter-spacing: 0.02em; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.5); }

    .animate-fade-in-down { animation: fadeInDown .35s ease-out; }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
    .shimmer {
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.2), transparent);
      background-size: 200% 100%;
      animation: shimmer 2s infinite;
    }
    @keyframes purchasePop {
      0% { opacity: 0; transform: translateY(-16px) scale(.94); }
      70% { opacity: 1; transform: translateY(3px) scale(1.02); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes coinBump {
      0%, 100% { transform: scale(1); }
      45% { transform: scale(1.12); }
    }
    @keyframes attentionGlow {
      0%, 100% { box-shadow: 0 16px 32px rgba(14,165,233,.18), 0 0 0 0 rgba(255,255,255,.42); }
      50% { box-shadow: 0 20px 42px rgba(244,114,182,.28), 0 0 0 8px rgba(255,255,255,.10); }
    }
    @keyframes attentionDot {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.28); opacity: .62; }
    }
    .purchase-pop { animation: purchasePop .36s ease-out both; }
    .coin-bump { animation: coinBump .42s ease-out; }
    .attention-glow { animation: attentionGlow 1.45s ease-in-out infinite; }
    .attention-dot { animation: attentionDot .9s ease-in-out infinite; }
    @keyframes arenaFloat {
      0% { transform: translate3d(0,0,0) scale(1); }
      50% { transform: translate3d(0,-12px,0) scale(1.04); }
      100% { transform: translate3d(0,0,0) scale(1); }
    }
    @keyframes arenaPulse {
      0%, 100% { opacity: .4; }
      50% { opacity: .85; }
    }
    .arena-grid {
      background-image:
        linear-gradient(rgba(37,70,210,.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37,70,210,.045) 1px, transparent 1px);
      background-size: 30px 30px;
    }
    .arena-noise {
      background-image:
        linear-gradient(135deg, rgba(255,77,109,.08), transparent 38%),
        linear-gradient(225deg, rgba(0,168,168,.08), transparent 34%),
        linear-gradient(0deg, rgba(255,209,102,.12), transparent 45%);
    }
    .arena-orb {
      position: absolute;
      border-radius: 999px;
      filter: blur(8px);
      animation: arenaFloat 8s ease-in-out infinite;
      pointer-events: none;
      opacity: .6;
    }
    .arena-shell {
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }
    .arena-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255,255,255,.52), transparent 35%),
        linear-gradient(180deg, rgba(240,193,91,.06), transparent 45%);
      pointer-events: none;
      z-index: 0;
    }
    .arena-shell::after {
      content: "";
      position: absolute;
      inset: 18px;
      border: 1px solid rgba(185,124,91,.10);
      border-radius: 28px;
      pointer-events: none;
      z-index: 0;
    }
    .arena-panel {
      background:
        linear-gradient(180deg, rgba(255,255,255,.96), rgba(247,251,255,.94)),
        linear-gradient(135deg, rgba(103,232,249,.08), transparent 55%);
      border: 1px solid rgba(37,70,210,.10);
      box-shadow: 0 20px 44px rgba(37,70,210,.10);
      backdrop-filter: blur(16px);
      color: var(--arena-ink);
    }
    .arena-badge {
      border: 1px solid rgba(240,193,91,.45);
      background: rgba(240,193,91,.14);
      color: var(--arena-cream);
    }
    .arena-signal {
      animation: arenaPulse 2s ease-in-out infinite;
    }
    .scholar-shell {
      position: relative;
      min-height: 100vh;
      color: var(--arena-ink);
      background:
        linear-gradient(135deg, rgba(103,232,249,.16), transparent 34%),
        linear-gradient(225deg, rgba(255,77,109,.10), transparent 30%),
        linear-gradient(180deg, #f9fbff 0%, #eef7ff 58%, #fff7ed 100%);
    }
    .scholar-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size: 26px 26px;
      opacity: .35;
      pointer-events: none;
    }
    .paper-card {
      background:
        linear-gradient(180deg, rgba(255,255,255,.98), rgba(239,246,255,.96)),
        linear-gradient(135deg, rgba(255,209,102,.18), transparent 42%);
      color: var(--arena-ink);
      border: 1px solid rgba(37,70,210,.12);
      box-shadow: 0 18px 50px var(--arena-paper-shadow);
    }
    .lacquer-panel {
      background:
        linear-gradient(135deg, #2447d8 0%, #7c3aed 48%, #ff4d6d 100%);
      color: var(--arena-cream);
      border: 1px solid rgba(255,255,255,.22);
      box-shadow: 0 18px 42px rgba(37,70,210,.22);
    }
    .cinnabar-btn {
      background: linear-gradient(135deg, var(--arena-cinnabar-bright), var(--arena-cinnabar));
      color: var(--arena-cream);
      box-shadow: 0 12px 28px rgba(166,45,43,.35);
    }
    .jade-btn {
      background: linear-gradient(135deg, #22d3ee, var(--arena-jade));
      color: #f6fff8;
      box-shadow: 0 12px 28px rgba(6,182,212,.26);
    }
    .gold-btn {
      background: linear-gradient(135deg, #f7d57a, var(--arena-gold));
      color: #492211;
      box-shadow: 0 12px 28px rgba(240,193,91,.28);
    }
    .ghost-btn {
      background: rgba(255,255,255,.82);
      border: 1px solid rgba(37,70,210,.12);
      color: var(--arena-ink);
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 24px rgba(70,42,32,.08);
    }
    .page-heading {
      font-family: 'Chakra Petch', sans-serif;
      letter-spacing: 0;
      color: var(--arena-ink);
    }
    .section-kicker {
      font-family: 'Chakra Petch', sans-serif;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: #b97c5b;
      font-size: 12px;
    }
    .mobile-btn,
    .mobile-btn-sm {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      line-height: 1.2;
    }
    .mobile-btn {
      padding: 14px 18px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
    }
    .mobile-btn-sm {
      padding: 11px 16px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 700;
    }
    @media (max-width: 640px) {
      .mobile-btn {
        min-height: 52px;
        padding: 15px 18px;
      }
      .mobile-btn-sm {
        min-height: 46px;
        padding: 12px 15px;
      }
    }

    /* loading */
    .loader { border: 5px solid rgba(255,255,255,0.2); border-top: 5px solid #f43f5e; border-radius: 50%;
              width: 60px; height: 60px; animation: spin 1s linear infinite; margin: 80px auto; }
    @keyframes spin { 0%{transform:rotate(0)} 100%{transform:rotate(360deg)} }
  </style>
</head>
<body class="bg-slate-900 text-gray-800">
  <div id="root">
    <div class="scholar-shell arena-grid arena-noise flex min-h-screen flex-col items-center justify-center text-[var(--arena-ink)]">
      <img src="logo-system.png" alt="HSK Battle Arena Logo" class="w-28 h-28 object-contain mb-4 drop-shadow-[0_12px_24px_rgba(0,0,0,0.28)]">
      <div class="loader"></div>
      <div class="page-heading text-xl font-bold">กำลังโหลด HSK Battle Arena...</div>
    </div>
  </div>
