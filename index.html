<head>

  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Sarabun:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    :root {
      --arena-ink: #2e231e;
      --arena-lacquer: #6e342d;
      --arena-cinnabar: #b9442f;
      --arena-cinnabar-bright: #de6144;
      --arena-jade: #2f8f7a;
      --arena-jade-soft: #71b8a1;
      --arena-gold: #f0c15b;
      --arena-gold-soft: #f8df9a;
      --arena-cream: #fffaf0;
      --arena-paper: #fffdf7;
      --arena-paper-soft: #f7efe2;
      --arena-paper-shadow: rgba(70, 42, 32, 0.12);
    }
    body {
      font-family: 'Sarabun', sans-serif;
      color: #352721;
      background:
        radial-gradient(circle at top, rgba(240,193,91,0.22), transparent 24%),
        radial-gradient(circle at 15% 18%, rgba(222,97,68,0.10), transparent 20%),
        linear-gradient(180deg, #fffefb 0%, #fbf4e8 55%, #f6ecdd 100%);
    }
    .font-zh { font-family: 'Noto Sans SC', sans-serif; }
    .font-display { font-family: 'Chakra Petch', sans-serif; letter-spacing: 0.02em; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.5); }

    .animate-fade-in-down { animation: fadeInDown .35s ease-out; }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
    .shimmer {
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.2), transparent);
      background-size: 200% 100%;
      animation: shimmer 2s infinite;
    }
    @keyframes arenaFloat {
      0% { transform: translate3d(0,0,0) scale(1); }
      50% { transform: translate3d(0,-12px,0) scale(1.04); }
      100% { transform: translate3d(0,0,0) scale(1); }
    }
    @keyframes arenaPulse {
      0%, 100% { opacity: .4; }
      50% { opacity: .85; }
    }
    .arena-grid {
      background-image:
        linear-gradient(rgba(185,124,91,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(185,124,91,.05) 1px, transparent 1px),
        linear-gradient(45deg, rgba(113,184,161,.04) 25%, transparent 25%, transparent 50%, rgba(113,184,161,.04) 50%, rgba(113,184,161,.04) 75%, transparent 75%, transparent);
      background-size: 28px 28px, 28px 28px, 56px 56px;
    }
    .arena-noise {
      background-image:
        radial-gradient(circle at 20% 20%, rgba(113,184,161,.10), transparent 30%),
        radial-gradient(circle at 80% 0%, rgba(222,97,68,.10), transparent 24%),
        radial-gradient(circle at 50% 80%, rgba(240,193,91,.12), transparent 28%);
    }
    .arena-orb {
      position: absolute;
      border-radius: 999px;
      filter: blur(8px);
      animation: arenaFloat 8s ease-in-out infinite;
      pointer-events: none;
      opacity: .6;
    }
    .arena-shell {
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }
    .arena-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255,255,255,.52), transparent 35%),
        linear-gradient(180deg, rgba(240,193,91,.06), transparent 45%);
      pointer-events: none;
      z-index: 0;
    }
    .arena-shell::after {
      content: "";
      position: absolute;
      inset: 18px;
      border: 1px solid rgba(185,124,91,.10);
      border-radius: 28px;
      pointer-events: none;
      z-index: 0;
    }
    .arena-panel {
      background:
        linear-gradient(180deg, rgba(255,255,255,.96), rgba(251,245,235,.96)),
        linear-gradient(135deg, rgba(240,193,91,.06), transparent 55%);
      border: 1px solid rgba(185,124,91,.12);
      box-shadow: 0 20px 44px rgba(70,42,32,.10);
      backdrop-filter: blur(16px);
      color: #47322c;
    }
    .arena-badge {
      border: 1px solid rgba(240,193,91,.45);
      background: rgba(240,193,91,.14);
      color: var(--arena-cream);
    }
    .arena-signal {
      animation: arenaPulse 2s ease-in-out infinite;
    }
    .scholar-shell {
      position: relative;
      min-height: 100vh;
      color: var(--arena-ink);
      background:
        radial-gradient(circle at top, rgba(240,193,91,.16), transparent 18%),
        radial-gradient(circle at 82% 14%, rgba(113,184,161,.10), transparent 22%),
        linear-gradient(180deg, #fffefb 0%, #fbf4e8 58%, #f5ebdd 100%);
    }
    .scholar-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size: 26px 26px;
      opacity: .35;
      pointer-events: none;
    }
    .paper-card {
      background:
        linear-gradient(180deg, rgba(255,248,235,.98), rgba(246,236,214,.96)),
        radial-gradient(circle at top right, rgba(240,193,91,.18), transparent 30%);
      color: #402120;
      border: 1px solid rgba(166,45,43,.14);
      box-shadow: 0 18px 50px var(--arena-paper-shadow);
    }
    .lacquer-panel {
      background:
        linear-gradient(135deg, rgba(185,68,47,.96), rgba(128,52,40,.94)),
        radial-gradient(circle at top, rgba(255,237,185,.22), transparent 34%);
      color: var(--arena-cream);
      border: 1px solid rgba(248,223,154,.16);
      box-shadow: 0 18px 42px rgba(115,58,43,.18);
    }
    .cinnabar-btn {
      background: linear-gradient(135deg, var(--arena-cinnabar-bright), var(--arena-cinnabar));
      color: var(--arena-cream);
      box-shadow: 0 12px 28px rgba(166,45,43,.35);
    }
    .jade-btn {
      background: linear-gradient(135deg, #2aa381, var(--arena-jade));
      color: #f6fff8;
      box-shadow: 0 12px 28px rgba(31,138,112,.32);
    }
    .gold-btn {
      background: linear-gradient(135deg, #f7d57a, var(--arena-gold));
      color: #492211;
      box-shadow: 0 12px 28px rgba(240,193,91,.28);
    }
    .ghost-btn {
      background: rgba(255,255,255,.82);
      border: 1px solid rgba(185,124,91,.16);
      color: #59342d;
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 24px rgba(70,42,32,.08);
    }
    .page-heading {
      font-family: 'Chakra Petch', sans-serif;
      letter-spacing: .03em;
      color: #442a24;
    }
    .section-kicker {
      font-family: 'Chakra Petch', sans-serif;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: #b97c5b;
      font-size: 12px;
    }
    .mobile-btn,
    .mobile-btn-sm {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      line-height: 1.2;
    }
    .mobile-btn {
      padding: 14px 18px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
    }
    .mobile-btn-sm {
      padding: 11px 16px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 700;
    }
    @media (max-width: 640px) {
      .mobile-btn {
        min-height: 52px;
        padding: 15px 18px;
      }
      .mobile-btn-sm {
        min-height: 46px;
        padding: 12px 15px;
      }
    }

    /* loading */
    .loader { border: 5px solid rgba(255,255,255,0.2); border-top: 5px solid #f43f5e; border-radius: 50%;
              width: 60px; height: 60px; animation: spin 1s linear infinite; margin: 80px auto; }
    @keyframes spin { 0%{transform:rotate(0)} 100%{transform:rotate(360deg)} }
  </style>
</head>
<body class="bg-slate-900 text-gray-800">
  <div id="root">
    <div class="scholar-shell arena-grid arena-noise flex min-h-screen flex-col items-center justify-center text-[var(--arena-ink)]">
      <img src="logo-system.png" alt="HSK Battle Arena Logo" class="w-28 h-28 object-contain mb-4 drop-shadow-[0_12px_24px_rgba(0,0,0,0.28)]">
      <div class="loader"></div>
      <div class="page-heading text-xl font-bold">กำลังโหลด HSK Battle Arena...</div>
    </div>
  </div>
